# Cloudflare Workers configuration for MaddieHQ (Node.js stack).
#
# Bindings use placeholder IDs — the first real deploy will replace them
# with values from `wrangler d1 create` / `wrangler r2 bucket create`.

name = "maddiehq"
main = ".open-next/worker.js"

# Custom domain — Cloudflare provisions the cert on deploy.
# Requires oqodo.com to be on this Cloudflare account.
routes = [
  { pattern = "maddiehq.oqodo.com", custom_domain = true }
]

# 2024-09-23 is the earliest compat date that ships the `nodejs_compat` flag
# behavior the audit (#287) expects. Pin a date older than the SDKs we use
# (Stripe, Resend, Anthropic) all advertise Workers support against.
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets emitted by `opennextjs-cloudflare build`.
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Plain env vars (non-secret). Secrets go through `wrangler secret put`.
[vars]
DATABASE_DRIVER = "d1"
APP_NAME = "MaddieHQ"

# ── D1 (Cloudflare's serverless SQLite) ────────────────────────────────
# `binding = "DB"` is what runtime code looks up via getCloudflareContext()
# in lib/db.ts. database_id is filled in after running:
#   wrangler d1 create maddiehq-db
[[d1_databases]]
binding = "DB"
database_name = "maddiehq-db"
database_id = "067da619-16e0-4dd0-b999-c6a168919a6c"
migrations_dir = "migrations"

# ── R2 (object storage) ────────────────────────────────────────────────
# `binding = "STORAGE"` is what lib/storage.ts looks up via
# getCloudflareContext() to use the native R2 path (#291). Operator
# setup before first deploy:
#   1. Enable R2 on the account if not already:
#      https://dash.cloudflare.com/?to=/:account/r2 → Enable R2
#   2. `wrangler r2 bucket create maddiehq-storage`
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "maddiehq-storage"

# ── Video processor (Cloudflare Containers via separate Worker) ────────
# Lives in node/workers/video-processor and owns the VideoProcessor
# Container Class (ffmpeg + Whisper + Claude vision). Deployed
# independently — see that directory's README. The shared secret used to
# auth the call is stored as the VIDEO_PROCESSOR_SECRET Worker secret on
# this side and SHARED_SECRET on the video processor side.
[[services]]
binding = "VIDEO_PROCESSOR"
service = "maddiehq-video-processor"

# ── Environment-specific overrides ─────────────────────────────────────
# Production deploy will use `wrangler deploy --env production` and override
# the placeholder IDs above. Keeping the top-level entries valid so local
# `opennextjs-cloudflare preview` can boot before the production env is
# created.
[env.production]
name = "maddiehq"
