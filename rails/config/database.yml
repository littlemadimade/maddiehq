# Database configuration.
#
# By default, uses SQLite (zero-config).
# Set DATABASE_URL to switch to PostgreSQL:
#   DATABASE_URL=postgres://user:password@localhost:5432/myapp
#
# When DATABASE_URL is set, it takes precedence over the adapter/database
# settings below. Rails handles this automatically.

<% if ENV["DATABASE_URL"]&.start_with?("postgres") %>
# ── PostgreSQL mode (DATABASE_URL detected) ──────────────────────────────────
default: &default
  adapter: postgresql
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default

test:
  <<: *default
  database: <%= ENV["DATABASE_URL"]&.sub(/\/[^\/]+$/, "/#{ENV.fetch('APP_NAME', 'maddiehq').downcase}_test") %>

production:
  <<: *default

<% else %>
# ── SQLite mode (default) ────────────────────────────────────────────────────
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3
  pragma:
    journal_mode: delete
    foreign_keys: true

test:
  <<: *default
  database: storage/test.sqlite3
  pragma:
    foreign_keys: true

production:
  <<: *default
  database: storage/production.sqlite3
  pragma:
    journal_mode: wal
    foreign_keys: true
    synchronous: normal
    cache_size: -20000
    busy_timeout: 5000
<% end %>
