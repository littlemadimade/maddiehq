# Fly.io configuration for AppSeed (Node.js / Next.js)
#
# Replace "appseed" with your app name before deploying.
# Deploy from the `node/` directory:
#   cp deploy/fly/fly.toml node/fly.toml
#   cd node && fly deploy

app = "appseed"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3013"
  DATABASE_PATH = "/data/appseed.db"

# ── Single machine constraint ────────────────────────────────────────────────
# SQLite requires exactly one writer. Never scale beyond 1 machine.
# auto_stop_machines MUST be false — a stopped machine loses its volume mount
# and Litestream replication will halt.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  auto_stop_machines = false

# ── Persistent volume ────────────────────────────────────────────────────────
# Create before first deploy:
#   fly volumes create appseed_data --region iad --size 1
[mounts]
  source = "appseed_data"
  destination = "/data"

# ── HTTP service ──────────────────────────────────────────────────────────────
[[services]]
  internal_port = 3013
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # ── Health check ──────────────────────────────────────────────────────────
  [[services.http_checks]]
    interval = 15000          # 15 seconds
    timeout = 5000            # 5 seconds
    grace_period = "10s"
    method = "GET"
    path = "/"
