AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AppSeed single-instance deployment — VPC, Security Group, EC2, EBS, and
  Elastic IP. Estimated cost: $8-17/month (t3.micro/t3.small).

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium, t4g.micro, t4g.small]
    Description: EC2 instance type (t3.micro is free-tier eligible)

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair name for EC2 access

  AppRepo:
    Type: String
    Default: "https://github.com/YOUR_ORG/YOUR_REPO.git"
    Description: Git repository URL to clone

  AppBranch:
    Type: String
    Default: main
    Description: Git branch to deploy

  Domain:
    Type: String
    Default: ""
    Description: >
      Domain name for automatic HTTPS via Caddy (e.g., app.example.com).
      Leave empty to skip Caddy setup.

  EBSVolumeSize:
    Type: Number
    Default: 20
    MinValue: 8
    MaxValue: 100
    Description: Size of the EBS data volume in GB

  SSHCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: >
      CIDR block for SSH access. Restrict to your IP for security
      (e.g., 203.0.113.10/32).

  LitestreamBucket:
    Type: String
    Default: ""
    Description: >
      S3 bucket name for Litestream backups. Leave empty to skip
      Litestream IAM permissions.

# ─────────────────────────────────────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────────────────────────────────────
Conditions:
  HasLitestreamBucket: !Not [!Equals [!Ref LitestreamBucket, ""]]

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── VPC ──────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: appseed-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: appseed-igw

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: appseed-public-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: appseed-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── Security Group ──────────────────────────────────────────────────────
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AppSeed - SSH, HTTP, HTTPS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHCidr
          Description: SSH access
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
      Tags:
        - Key: Name
          Value: appseed-sg

  # ── IAM Role (EC2 + optional S3 for Litestream) ────────────────────────
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: appseed-ec2-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  LitestreamS3Policy:
    Type: AWS::IAM::Policy
    Condition: HasLitestreamBucket
    Properties:
      PolicyName: appseed-litestream-s3
      Roles:
        - !Ref InstanceRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::${LitestreamBucket}"
              - !Sub "arn:aws:s3:::${LitestreamBucket}/*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # ── EBS Data Volume ─────────────────────────────────────────────────────
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Snapshot
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      Size: !Ref EBSVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: appseed-data

  # ── EC2 Instance ────────────────────────────────────────────────────────
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !FindInMap [RegionAMI, !Ref "AWS::Region", AMI]
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: appseed-ec2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > >(tee /var/log/appseed-init.log) 2>&1

          # ── Install Docker ──
          dnf update -y
          dnf install -y docker git
          systemctl enable --now docker
          usermod -aG docker ec2-user

          # Docker Compose plugin
          COMPOSE_VERSION="v2.29.1"
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -SL "https://github.com/docker/compose/releases/download/$COMPOSE_VERSION/docker-compose-linux-$(uname -m)" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          # ── Mount EBS data volume ──
          while [ ! -b /dev/xvdf ] && [ ! -b /dev/nvme1n1 ]; do sleep 2; done
          DATA_DEV=""
          for d in /dev/xvdf /dev/nvme1n1; do [ -b "$d" ] && DATA_DEV="$d" && break; done
          if ! blkid "$DATA_DEV" | grep -q TYPE; then mkfs.ext4 "$DATA_DEV"; fi
          mkdir -p /data
          mount "$DATA_DEV" /data
          UUID=$(blkid -s UUID -o value "$DATA_DEV")
          grep -q "$UUID" /etc/fstab || echo "UUID=$UUID /data ext4 defaults,nofail 0 2" >> /etc/fstab

          # ── Clone and configure ──
          git clone --branch ${AppBranch} ${AppRepo} /opt/appseed
          cd /opt/appseed

          if [ -f .env.example ] && [ ! -f .env ]; then
            cp .env.example .env
          fi
          SECRET=$(openssl rand -base64 32)
          grep -q "^BETTER_AUTH_SECRET=.\+" .env 2>/dev/null || echo "BETTER_AUTH_SECRET=$SECRET" >> .env

          # ── Caddy for HTTPS ──
          DOMAIN="${Domain}"
          if [ -n "$DOMAIN" ]; then
            dnf install -y caddy || { dnf copr enable -y @caddy/caddy && dnf install -y caddy; }
            cat > /etc/caddy/Caddyfile <<CADDYEOF
          $DOMAIN {
              reverse_proxy localhost:3013
          }
          CADDYEOF
            systemctl enable --now caddy
          fi

          # ── Systemd service ──
          cp deploy/ec2/appseed.service /etc/systemd/system/
          systemctl daemon-reload
          systemctl enable appseed

          # ── Start ──
          DOCKER_BUILDKIT=0 docker compose --profile prod up -d --build
          echo ">>> AppSeed init complete at $(date -u)"

  # ── Attach EBS volume to instance ───────────────────────────────────────
  VolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref Instance
      VolumeId: !Ref DataVolume
      Device: /dev/xvdf

  # ── Elastic IP ──────────────────────────────────────────────────────────
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: appseed-eip

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref Instance
      AllocationId: !GetAtt ElasticIP.AllocationId

# ─────────────────────────────────────────────────────────────────────────────
# Mappings — Amazon Linux 2023 AMIs (arm64 for t4g, x86_64 for t3)
# ─────────────────────────────────────────────────────────────────────────────
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec  # Amazon Linux 2023, x86_64
    us-east-2:
      AMI: ami-05fb0b8c1424f266b
    us-west-1:
      AMI: ami-0cbd40f694b804622
    us-west-2:
      AMI: ami-0efcece6bed30fd98
    eu-west-1:
      AMI: ami-0905a3c97561e0b69
    eu-central-1:
      AMI: ami-0faab6bdbac9486fb
    ap-southeast-1:
      AMI: ami-012c2e8e24e2ae21f
    ap-northeast-1:
      AMI: ami-0d52744d6551d851e

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  PublicIP:
    Description: Elastic IP of the EC2 instance
    Value: !Ref ElasticIP

  SSHCommand:
    Description: SSH into the instance
    Value: !Sub "ssh -i ${KeyName}.pem ec2-user@${ElasticIP}"

  AppURL:
    Description: Application URL (HTTP — use Caddy/ALB for HTTPS)
    Value: !Sub "http://${ElasticIP}:3013"

  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  DataVolumeId:
    Description: EBS Data Volume ID
    Value: !Ref DataVolume
